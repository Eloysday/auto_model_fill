services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # 本地代码实时挂载，修改代码自动热重载
      - .:/app
      # 持久化任务数据，直接映射宿主机目录
      - ./jobs:/app/jobs
    env_file:
      - .env
    # 生产模式（asyncio + subprocess 架构，无需 reload）
    command: >
      uvicorn server:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    stop_grace_period: 60s
