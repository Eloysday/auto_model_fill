version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app              # 代码挂载（git pull 自动生效）
      - jobs_data:/app/jobs  # job 持久化
    env_file:
      - .env
    command: >
      uvicorn server:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app
    restart: unless-stopped

volumes:
  jobs_data:
